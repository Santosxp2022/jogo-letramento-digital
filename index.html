<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Missões do Letramento Digital</title>
  <style>
    :root{
      --bg-1:#040817;
      --bg-2:#0a1431;
      --bg-3:#11204d;
      --panel:rgba(18,28,58,.78);
      --line:rgba(255,255,255,.12);
      --text:#eef3ff;
      --muted:#b7c3ea;
      --primary:#7c5cff;
      --primary-2:#a78bfa;
      --cyan:#22d3ee;
      --green:#2dd4bf;
      --yellow:#fbbf24;
      --shadow:0 20px 45px rgba(0,0,0,.34);
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 15% 12%, rgba(124,92,255,.20), transparent 18%),
        radial-gradient(circle at 82% 12%, rgba(34,211,238,.14), transparent 16%),
        radial-gradient(circle at 50% 100%, rgba(45,212,191,.08), transparent 24%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2) 42%, var(--bg-3));
      overflow-x:hidden;
    }

    .bg-grid{
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.11;
      background-image:
        linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px);
      background-size:30px 30px;
      mask-image: radial-gradient(circle at center, rgba(0,0,0,.95), transparent 85%);
      z-index:0;
    }

    .bg-gamer{
      position:fixed;
      inset:0;
      z-index:0;
      pointer-events:none;
      opacity:.50;
      background-repeat:no-repeat;
      background-position:center center;
      background-size:cover;
      background-image:
        linear-gradient(180deg, rgba(4,8,23,.10), rgba(4,8,23,.55)),
        url("data:image/svg+xml;utf8,\
<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1600 900'>\
<defs>\
<linearGradient id='g1' x1='0' y1='0' x2='1' y2='1'>\
<stop stop-color='%230b1538' offset='0'/>\
<stop stop-color='%23121d4b' offset='1'/>\
</linearGradient>\
<linearGradient id='g2' x1='0' y1='0' x2='1' y2='0'>\
<stop stop-color='%237c5cff' stop-opacity='.9' offset='0'/>\
<stop stop-color='%2322d3ee' stop-opacity='.9' offset='1'/>\
</linearGradient>\
<filter id='blur'><feGaussianBlur stdDeviation='8'/></filter>\
</defs>\
<rect width='1600' height='900' fill='url(%23g1)'/>\
<circle cx='220' cy='120' r='150' fill='%237c5cff' opacity='.12' filter='url(%23blur)'/>\
<circle cx='1360' cy='160' r='150' fill='%2322d3ee' opacity='.10' filter='url(%23blur)'/>\
<circle cx='820' cy='760' r='200' fill='%232dd4bf' opacity='.07' filter='url(%23blur)'/>\
<path d='M0 690 L350 520 L620 640 L940 420 L1230 540 L1600 360' fill='none' stroke='url(%23g2)' stroke-width='6' opacity='.35'/>\
<path d='M0 760 L260 640 L520 730 L860 520 L1100 630 L1600 470' fill='none' stroke='url(%23g2)' stroke-width='3' opacity='.25'/>\
<rect x='110' y='520' width='220' height='130' rx='18' fill='%23142045' stroke='%237c5cff' stroke-opacity='.45'/>\
<rect x='130' y='540' width='180' height='90' rx='10' fill='%2309142f' stroke='%2322d3ee' stroke-opacity='.35'/>\
<rect x='1250' y='470' width='230' height='150' rx='22' fill='%23142045' stroke='%2322d3ee' stroke-opacity='.40'/>\
<rect x='1275' y='500' width='180' height='90' rx='14' fill='%2309142f' stroke='%237c5cff' stroke-opacity='.35'/>\
<rect x='730' y='320' width='150' height='230' rx='28' fill='%23142045' stroke='%237c5cff' stroke-opacity='.45'/>\
<rect x='750' y='350' width='110' height='170' rx='18' fill='%2309142f' stroke='%2322d3ee' stroke-opacity='.35'/>\
<circle cx='805' cy='378' r='10' fill='%23fbbf24' opacity='.9'/>\
<rect x='770' y='470' width='70' height='18' rx='9' fill='%237c5cff' opacity='.8'/>\
<g opacity='.45'>\
<circle cx='200' cy='260' r='4' fill='white'/>\
<circle cx='260' cy='300' r='3' fill='white'/>\
<circle cx='1340' cy='260' r='4' fill='white'/>\
<circle cx='1220' cy='210' r='3' fill='white'/>\
<circle cx='880' cy='180' r='3' fill='white'/>\
</g>\
</svg>");
    }

    .wrap{
      position:relative;
      z-index:2;
      max-width:1020px;
      margin:0 auto;
      padding:20px 16px 32px;
    }

    .headline{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }

    .headline-left{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .app-title{
      font-size:1rem;
      color:#d9e2ff;
      font-weight:800;
      letter-spacing:.02em;
      opacity:.95;
    }

    .app-subtitle{
      font-size:.9rem;
      color:var(--muted);
    }

    .hud{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-bottom:14px;
    }

    .pill{
      display:flex;
      align-items:center;
      gap:8px;
      padding:11px 15px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow);
      backdrop-filter: blur(12px);
      font-weight:800;
      color:#f3f6ff;
    }

    .progress-card{
      padding:10px 12px 12px;
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.09);
      border-radius:18px;
      margin-bottom:16px;
      backdrop-filter: blur(10px);
    }

    .progress-top{
      display:flex;
      justify-content:space-between;
      gap:10px;
      margin-bottom:8px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:.92rem;
    }

    .progress-wrap{
      height:14px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.1);
      border-radius:999px;
      overflow:hidden;
      position:relative;
    }

    .bar{
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg, var(--primary), var(--primary-2));
      box-shadow:0 0 20px rgba(124,92,255,.45), inset 0 0 10px rgba(255,255,255,.25);
      transition:width .3s ease;
      position:relative;
    }

    .bar::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.35), transparent);
      animation:shine 2s linear infinite;
    }

    @keyframes shine{
      from{transform:translateX(-100%)}
      to{transform:translateX(100%)}
    }

    .card{
      position:relative;
      overflow:hidden;
      border-radius:26px;
      padding:22px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.035));
      border:1px solid rgba(255,255,255,.12);
      box-shadow:var(--shadow);
      backdrop-filter: blur(16px);
    }

    .card::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at top left, rgba(124,92,255,.18), transparent 22%),
        radial-gradient(circle at top right, rgba(34,211,238,.10), transparent 20%),
        radial-gradient(circle at bottom left, rgba(45,212,191,.08), transparent 18%);
    }

    .orb{
      position:absolute;
      border-radius:999px;
      filter:blur(14px);
      pointer-events:none;
      opacity:.36;
    }

    .orb.o1{width:160px;height:160px;top:-45px;right:-35px;background:rgba(124,92,255,.28)}
    .orb.o2{width:130px;height:130px;bottom:-50px;left:-25px;background:rgba(34,211,238,.16)}

    h1,h2,h3{margin:0 0 10px;position:relative;z-index:1}
    h1{
      font-size:clamp(2.2rem, 4vw, 3.6rem);
      letter-spacing:-.04em;
      line-height:1.02;
    }
    h2{
      font-size:clamp(1.35rem, 2.5vw, 2rem);
      letter-spacing:-.02em;
    }

    p{
      margin:8px 0;
      line-height:1.55;
      color:var(--muted);
      position:relative;
      z-index:1;
    }

    .small{font-size:.92rem;color:var(--muted)}
    .divider{
      height:1px;
      background:var(--line);
      margin:16px 0 18px;
      position:relative;
      z-index:1;
    }

    .hero-tags{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
      position:relative;
      z-index:1;
    }

    .hero-tag{
      padding:9px 13px;
      border-radius:999px;
      background:rgba(124,92,255,.14);
      border:1px solid rgba(124,92,255,.26);
      color:#efeaff;
      font-size:.9rem;
      font-weight:700;
    }

    label{
      display:block;
      margin:0 0 8px;
      color:#dce5ff;
      font-size:.95rem;
      font-weight:700;
      position:relative;
      z-index:1;
    }

    input, select, textarea{
      width:100%;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(7,11,28,.38);
      color:var(--text);
      padding:15px 16px;
      font-size:1rem;
      outline:none;
      transition:border-color .18s ease, box-shadow .18s ease, transform .18s ease, background .18s ease;
      position:relative;
      z-index:1;
    }

    input:focus, select:focus, textarea:focus{
      border-color:rgba(124,92,255,.8);
      box-shadow:0 0 0 4px rgba(124,92,255,.18);
      background:rgba(7,11,28,.48);
    }

    input:disabled{
      opacity:.82;
      cursor:not-allowed;
    }

    textarea{
      min-height:120px;
      resize:vertical;
    }

    .btns{
      display:flex;
      justify-content:flex-end;
      gap:10px;
      margin-top:16px;
      flex-wrap:wrap;
      position:relative;
      z-index:1;
    }

    button{
      border:0;
      border-radius:999px;
      padding:13px 18px;
      cursor:pointer;
      background:linear-gradient(135deg, var(--primary), var(--primary-2));
      color:#fff;
      font-weight:900;
      font-size:.98rem;
      box-shadow:0 14px 26px rgba(124,92,255,.25);
      transition:transform .14s ease, opacity .14s ease, filter .14s ease;
    }

    button:hover{transform:translateY(-1px)}
    button:active{transform:translateY(0)}
    button:disabled{opacity:.46;cursor:not-allowed}
    .secondary{
      background:rgba(255,255,255,.08);
      color:#eef2ff;
      border:1px solid rgba(255,255,255,.12);
      box-shadow:none;
    }

    .choices{
      display:grid;
      gap:10px;
      margin-top:10px;
      position:relative;
      z-index:1;
    }

    .choice{
      padding:14px 15px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.04);
      cursor:pointer;
      transition:transform .14s ease, border-color .14s ease, background .14s ease, box-shadow .14s ease;
      color:#edf2ff;
    }

    .choice:hover{
      transform:translateY(-1px);
      border-color:rgba(124,92,255,.55);
      background:rgba(124,92,255,.10);
      box-shadow:0 8px 18px rgba(0,0,0,.16);
    }

    .choice.selected{
      outline:2px solid rgba(124,92,255,.9);
      background:rgba(124,92,255,.16);
      border-color:rgba(124,92,255,.55);
    }

    .hint{
      margin-top:8px;
      color:var(--muted);
      font-size:.92rem;
      position:relative;
      z-index:1;
    }

    .toast{
      margin-top:14px;
      padding:13px 14px;
      border-radius:18px;
      background:rgba(124,92,255,.16);
      border:1px solid rgba(124,92,255,.28);
      color:#ede7ff;
      position:relative;
      z-index:1;
    }

    .result-grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0,1fr));
      gap:12px;
      margin:14px 0 10px;
      position:relative;
      z-index:1;
    }

    .result-card{
      border-radius:18px;
      padding:14px 15px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.12);
      min-height:92px;
    }

    .result-title{
      font-size:.85rem;
      color:var(--muted);
      margin-bottom:8px;
    }

    .result-value{
      font-size:1.2rem;
      font-weight:900;
      color:#fff;
    }

    .badge-grid{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:12px;
      position:relative;
      z-index:1;
    }

    .badge-card{
      padding:11px 14px;
      border-radius:16px;
      background:rgba(124,92,255,.16);
      border:1px solid rgba(124,92,255,.30);
      font-size:.95rem;
      font-weight:800;
      color:#f1ebff;
      box-shadow:0 10px 20px rgba(0,0,0,.12);
    }

    .reward-pop{
      position:fixed;
      top:18px;
      right:18px;
      z-index:9999;
      background:linear-gradient(135deg, var(--primary), var(--primary-2));
      color:#fff;
      padding:12px 16px;
      border-radius:14px;
      box-shadow:0 12px 28px rgba(0,0,0,.28);
      font-weight:900;
      animation:popIn .24s ease;
    }

    .mission-pop{
      position:fixed;
      top:82px;
      left:50%;
      transform:translateX(-50%);
      z-index:9998;
      background:rgba(124,92,255,.96);
      color:#fff;
      padding:12px 18px;
      border-radius:16px;
      box-shadow:0 10px 24px rgba(0,0,0,.28);
      font-weight:900;
      animation:popIn .22s ease;
      text-align:center;
    }

    @keyframes popIn{
      from{transform:translateY(-8px);opacity:0}
      to{transform:translateY(0);opacity:1}
    }

    .empty-state{
      padding:16px;
      border-radius:18px;
      border:1px dashed rgba(255,255,255,.16);
      color:var(--muted);
      background:rgba(255,255,255,.03);
    }

    @media (max-width:760px){
      .wrap{padding:14px}
      .card{padding:18px}
      .result-grid{grid-template-columns:1fr}
      .reward-pop{
        left:12px;
        right:12px;
        top:12px;
      }
      .mission-pop{
        left:12px;
        right:12px;
        transform:none;
      }
      h1{font-size:2.2rem}
    }
  </style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-gamer"></div>

<div class="wrap">
  <div class="headline">
    <div class="headline-left">
      <div class="app-title">Missões do Letramento Digital</div>
      <div class="app-subtitle">Questionário gamificado para pesquisa acadêmica</div>
    </div>
  </div>

  <div class="hud">
    <div class="pill" id="hudStep">Missão 0/11</div>
    <div class="pill" id="hudCoins">🪙 Moedas: 0</div>
    <div class="pill" id="hudXP">⚡ XP: 0</div>
  </div>

  <div class="progress-card">
    <div class="progress-top">
      <span id="progressLabel">Você está no início da jornada</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-wrap">
      <div class="bar" id="bar"></div>
    </div>
  </div>

  <div class="card" id="screen"></div>
</div>

<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwjNyAhaA0USNhwdLfJ_c7PD0IY9FZ-ej24f4lvDDchOjhIPj_A4hQFKFYPdFIkYjvy/exec";

  let alunosCache = [];
  let alunoSelecionado = null;
  let audioCtx = null;
  let audioUnlocked = false;

  async function carregarAlunosPorCurso(curso) {
    const url = `${WEB_APP_URL}?fn=alunos&curso=${encodeURIComponent(curso)}`;
    const resp = await fetch(url);
    const json = await resp.json();
    alunosCache = json.alunos || [];
    alunoSelecionado = null;
    return alunosCache;
  }

  function unlockAudio() {
    if (audioUnlocked) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      audioUnlocked = true;
    } catch (e) {
      console.warn("Áudio não disponível", e);
    }
  }

  function playTone({freq=440, duration=0.08, type="sine", gain=0.03, when=0}) {
    if (!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();

    osc.type = type;
    osc.frequency.value = freq;
    g.gain.value = gain;

    osc.connect(g);
    g.connect(audioCtx.destination);

    const startAt = audioCtx.currentTime + when;
    osc.start(startAt);
    g.gain.setValueAtTime(gain, startAt);
    g.gain.exponentialRampToValueAtTime(0.0001, startAt + duration);
    osc.stop(startAt + duration);
  }

  function playRewardSound() {
    if (!audioUnlocked || !audioCtx) return;
    playTone({freq:740, duration:0.07, type:"triangle", gain:0.03, when:0});
    playTone({freq:988, duration:0.09, type:"triangle", gain:0.028, when:0.08});
  }

  function playMissionSound() {
    if (!audioUnlocked || !audioCtx) return;
    playTone({freq:523, duration:0.06, type:"sine", gain:0.028, when:0});
    playTone({freq:659, duration:0.07, type:"sine", gain:0.025, when:0.08});
  }

  function playVictorySound() {
    if (!audioUnlocked || !audioCtx) return;
    playTone({freq:523, duration:0.08, type:"triangle", gain:0.03, when:0});
    playTone({freq:659, duration:0.08, type:"triangle", gain:0.03, when:0.09});
    playTone({freq:784, duration:0.10, type:"triangle", gain:0.03, when:0.18});
    playTone({freq:1046, duration:0.18, type:"triangle", gain:0.028, when:0.30});
  }

  const state = {
    startedAt: new Date().toISOString(),
    coins: 0,
    xp: 0,
    badges: [],
    step: 0,
    nome: "",
    matricula: "",
    curso: "",
    Q1_atividade: "",
    Q1_outro: "",
    Q2_escolhas: [],
    Q2_outro: "",
    Q2_jogo_qual: "",
    Q3_usa_estudar: "",
    Q3_1_exemplo: "",
    Q4_como_aprendeu: "",
    Q5_onde_busca: "",
    Q6_verifica_info: "",
    Q7_usou_IA: "",
    Q7_1_experiencia: "",
    Q8_estrutura_IFAC: "",
    Q9_prof_incentiva: "",
    Q9_1_exemplo: "",
    Q10_dificuldade: "",
    Q10_outra: "",
    Q11_habilidade: "",
    Q11_outra: "",
    device: /Mobi|Android/i.test(navigator.userAgent) ? "celular" : "PC"
  };

  const el = (id) => document.getElementById(id);
  const screen = el("screen");

  function escapeHtml(s) {
    return (s || "").replace(/[&<>"']/g, m => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;"
    }[m]));
  }

  function normTxt(s) {
    return String(s || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .trim();
  }

  function sel(v) {
    return state.curso === v ? "selected" : "";
  }

  function setProgress() {
    el("hudStep").textContent = `Missão ${Math.max(0, state.step)}/11`;
    const pct = Math.min(100, (Math.max(0, state.step) / 11) * 100);
    el("bar").style.width = pct + "%";
    el("progressPct").textContent = `${Math.round(pct)}%`;

    const labels = {
      0: "Você está no início da jornada",
      1: "Explorando seu uso das tecnologias",
      2: "Mapeando seus aplicativos favoritos",
      3: "Descobrindo como você estuda",
      4: "Entendendo sua aprendizagem digital",
      5: "Analisando sua busca por informação",
      6: "Investigando verificação de fontes",
      7: "Explorando uso de IA",
      8: "Refletindo sobre a estrutura tecnológica",
      9: "Observando o uso pedagógico das tecnologias",
      10: "Mapeando dificuldades digitais",
      11: "Projetando habilidades futuras"
    };
    el("progressLabel").textContent = labels[state.step] || "Avançando na jornada";
  }

  function showReward(text) {
    const div = document.createElement("div");
    div.className = "reward-pop";
    div.textContent = text;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 1800);
  }

  function showMissionMessage(text) {
    const div = document.createElement("div");
    div.className = "mission-pop";
    div.textContent = text;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 1600);
  }

  function showConfetti() {
    for (let i = 0; i < 90; i++) {
      const conf = document.createElement("div");
      conf.style.position = "fixed";
      conf.style.top = "-10px";
      conf.style.left = Math.random() * 100 + "vw";
      conf.style.width = "8px";
      conf.style.height = "14px";
      conf.style.background = `hsl(${Math.random() * 360}, 90%, 60%)`;
      conf.style.opacity = "0.92";
      conf.style.transform = `rotate(${Math.random() * 360}deg)`;
      conf.style.zIndex = "9999";
      conf.style.pointerEvents = "none";
      conf.style.borderRadius = "3px";
      document.body.appendChild(conf);

      const duration = 1200 + Math.random() * 1500;
      const drift = (Math.random() - 0.5) * 240;

      conf.animate(
        [
          { transform: `translate(0, 0) rotate(0deg)`, opacity: 1 },
          { transform: `translate(${drift}px, 100vh) rotate(720deg)`, opacity: 0.12 }
        ],
        { duration, easing: "ease-out" }
      );

      setTimeout(() => conf.remove(), duration);
    }
  }

  function award({ coins = 10, xp = 0, badge = null } = {}) {
    state.coins += coins;
    state.xp += xp;

    if (badge && !state.badges.includes(badge)) {
      state.badges.push(badge);
    }

    el("hudCoins").textContent = `🪙 Moedas: ${state.coins}`;
    el("hudXP").textContent = `⚡ XP: ${state.xp}`;

    let msg = "";
    if (coins) msg += `+${coins} moedas 🪙 `;
    if (xp) msg += `+${xp} XP ⚡`;
    if (msg) {
      showReward(msg.trim());
      playRewardSound();
    }

    if (badge) {
      setTimeout(() => showReward(`🏅 ${badge}`), 220);
    }
  }

  function next() {
    state.step++;
    setProgress();
    if (state.step >= 1 && state.step <= 11) {
      showMissionMessage(`Nova missão desbloqueada: ${state.step}/11`);
      playMissionSound();
    }
    render();
  }

  function back() {
    state.step = Math.max(0, state.step - 1);
    setProgress();
    render();
  }

  function renderIntro() {
    screen.innerHTML = `
      <div class="orb o1"></div>
      <div class="orb o2"></div>

      <h1>Missões do<br>Letramento Digital</h1>
      <p>Esta é uma entrevista em formato de jogo. Não há respostas certas ou erradas. Responda com sinceridade.</p>
      <p class="small">As respostas serão usadas apenas para fins acadêmicos e tratadas com confidencialidade.</p>

      <div class="hero-tags">
        <div class="hero-tag">🎮 Interativo</div>
        <div class="hero-tag">🪙 Recompensas</div>
        <div class="hero-tag">🔊 Som imersivo</div>
      </div>

      <div class="divider"></div>

      <h2>Cadastro</h2>

      <label>Curso</label>
      <select id="curso">
        <option value="">Selecione...</option>
        <option ${sel("Técnico em Agropecuária")}>Técnico em Agropecuária</option>
        <option ${sel("Técnico em Alimentos")}>Técnico em Alimentos</option>
        <option ${sel("Técnico em Biotecnologia")}>Técnico em Biotecnologia</option>
      </select>

      <div style="height:10px"></div>

      <label>Digite seu nome</label>
      <input id="nomeBusca" placeholder="Digite pelo menos 2 letras (ex.: ana)" disabled />
      <div id="sugestoes" class="choices"></div>
      <div class="hint">Após escolher o curso, digite parte do nome para encontrar sua ficha.</div>

      <div style="height:10px"></div>

      <label>Matrícula (automática)</label>
      <input id="matricula" placeholder="Selecione seu nome acima" disabled value="${escapeHtml(state.matricula)}"/>

      <div class="btns">
        <button id="startBtn" disabled>Começar missão</button>
      </div>

      <div class="toast small">
        Dica: escolha o curso, procure seu nome e entre na jornada digital.
      </div>
    `;

    const cursoSel = screen.querySelector("#curso");
    const nomeBusca = screen.querySelector("#nomeBusca");
    const sugestoes = screen.querySelector("#sugestoes");
    const matriculaInput = screen.querySelector("#matricula");
    const startBtn = screen.querySelector("#startBtn");

    function atualizarBotao() {
      const cursoOk = !!cursoSel.value;
      const alunoOk = !!state.nome && !!state.matricula;
      startBtn.disabled = !(cursoOk && alunoOk);
    }

    cursoSel.addEventListener("change", async () => {
      unlockAudio();
      sugestoes.innerHTML = "";
      state.nome = "";
      state.matricula = "";
      alunoSelecionado = null;
      nomeBusca.value = "";
      matriculaInput.value = "";
      nomeBusca.disabled = true;
      atualizarBotao();

      if (!cursoSel.value) return;

      try {
        await carregarAlunosPorCurso(cursoSel.value);
        nomeBusca.disabled = false;
        nomeBusca.placeholder = "Digite pelo menos 2 letras (ex.: ana)";
      } catch (e) {
        nomeBusca.placeholder = "Erro ao carregar alunos. Tente novamente.";
        console.error(e);
      }
    });

    nomeBusca.addEventListener("input", () => {
      const q = normTxt(nomeBusca.value);
      state.nome = "";
      state.matricula = "";
      alunoSelecionado = null;
      matriculaInput.value = "";
      sugestoes.innerHTML = "";

      if (q.length < 2) {
        atualizarBotao();
        return;
      }

      const results = alunosCache
        .filter(a => normTxt(a.nome).includes(q))
        .slice(0, 10);

      if (!results.length) {
        sugestoes.innerHTML = `<div class="empty-state">Nenhum nome encontrado. Tente outro trecho do nome.</div>`;
        atualizarBotao();
        return;
      }

      results.forEach(a => {
        const item = document.createElement("div");
        item.className = "choice";
        item.textContent = a.nome;

        item.onclick = () => {
          unlockAudio();
          alunoSelecionado = a;
          state.nome = a.nome;
          state.matricula = a.matricula;
          matriculaInput.value = a.matricula;

          sugestoes.innerHTML = "";
          const selDiv = document.createElement("div");
          selDiv.className = "choice selected";
          selDiv.textContent = a.nome;
          sugestoes.appendChild(selDiv);

          playMissionSound();
          atualizarBotao();
        };

        sugestoes.appendChild(item);
      });

      atualizarBotao();
    });

    startBtn.addEventListener("click", () => {
      unlockAudio();
      state.curso = cursoSel.value;
      award({ coins: 15, xp: 10, badge: "Cadastro concluído" });
      next();
    });

    atualizarBotao();
  }

  function renderChoices({ title, subtitle, options, selected, multi = false, limit = null, onSelect, extraHtml = "" }) {
    const info = multi && limit
      ? `<div class="small">Marque até <b>${limit}</b>. (${selected.length}/${limit})</div>`
      : "";

    screen.innerHTML = `
      <div class="orb o1"></div>
      <div class="orb o2"></div>

      <h2>${title}</h2>
      <p class="small">${subtitle || ""}</p>
      ${info}
      <div class="choices" id="choices"></div>
      ${extraHtml}
      <div class="btns">
        <button class="secondary" id="back">Voltar</button>
        <button id="next">Continuar</button>
      </div>
    `;

    const c = screen.querySelector("#choices");

    options.forEach(opt => {
      const div = document.createElement("div");
      div.className = "choice" + (
        multi
          ? (selected.includes(opt) ? " selected" : "")
          : (selected === opt ? " selected" : "")
      );
      div.textContent = opt;
      div.onclick = () => {
        unlockAudio();
        onSelect(opt);
      };
      c.appendChild(div);
    });

    screen.querySelector("#back").onclick = back;
  }

  function renderText({ title, subtitle, value, placeholder, onSave, showBack = true }) {
    screen.innerHTML = `
      <div class="orb o1"></div>
      <div class="orb o2"></div>

      <h2>${title}</h2>
      <p class="small">${subtitle || ""}</p>
      <textarea id="txt" placeholder="${escapeHtml(placeholder || "")}">${escapeHtml(value || "")}</textarea>
      <div class="btns">
        ${showBack ? `<button class="secondary" id="back">Voltar</button>` : ``}
        <button id="next">Continuar</button>
      </div>
    `;

    if (showBack) screen.querySelector("#back").onclick = back;

    screen.querySelector("#next").onclick = () => {
      unlockAudio();
      onSave(screen.querySelector("#txt").value.trim());
      next();
    };
  }

  function render() {
    setProgress();

    if (state.step === 0) return renderIntro();

    if (state.step === 1) {
      const options = [
        "Pesquisar informações",
        "Fazer trabalhos escolares",
        "Assistir videoaulas",
        "Produzir conteúdo",
        "Jogar jogos digitais",
        "Usar redes sociais",
        "Comunicar com amigos e família",
        "Outra"
      ];

      renderChoices({
        title: "Missão 1/11 — O que você mais gosta de fazer com tecnologias digitais?",
        subtitle: "Escolha uma opção.",
        options,
        selected: state.Q1_atividade,
        onSelect: (opt) => { state.Q1_atividade = opt; render(); },
        extraHtml: state.Q1_atividade === "Outra"
          ? `<div style="margin-top:10px"><label>Qual?</label><input id="q1outro" value="${escapeHtml(state.Q1_outro)}"/></div>`
          : ``
      });

      screen.querySelector("#next").onclick = () => {
        unlockAudio();
        if (!state.Q1_atividade) return alert("Escolha uma opção.");
        state.Q1_outro = state.Q1_atividade === "Outra"
          ? (screen.querySelector("#q1outro")?.value.trim() || "")
          : "";
        award({ coins: 10, xp: 5 });
        next();
      };
      return;
    }

    if (state.step === 2) {
      const options = ["WhatsApp","Instagram","Facebook","YouTube","TikTok","Google","ChatGPT","Jogo digital","Outro"];

      const onSelect = (opt) => {
        const arr = state.Q2_escolhas.slice();
        if (arr.includes(opt)) {
          state.Q2_escolhas = arr.filter(x => x !== opt);
        } else {
          if (arr.length >= 3) return;
          arr.push(opt);
          state.Q2_escolhas = arr;
        }
        render();
      };

      renderChoices({
        title: "Missão 2/11 — Quais aplicativos você mais utiliza? (até 3)",
        subtitle: "Marque até 3 opções.",
        options,
        selected: state.Q2_escolhas,
        multi: true,
        limit: 3,
        onSelect,
        extraHtml: `
          <div style="margin-top:10px">
            <div class="small">Se marcou <b>Jogo digital</b>, qual?</div>
            <input id="q2jogo" value="${escapeHtml(state.Q2_jogo_qual)}" placeholder="Ex.: Minecraft..."/>
          </div>
          <div style="margin-top:10px">
            <div class="small">Se marcou <b>Outro</b>, qual?</div>
            <input id="q2outro" value="${escapeHtml(state.Q2_outro)}" placeholder="Digite..."/>
          </div>
        `
      });

      screen.querySelector("#next").onclick = () => {
        unlockAudio();
        if (state.Q2_escolhas.length === 0) return alert("Marque pelo menos 1 opção.");
        state.Q2_jogo_qual = screen.querySelector("#q2jogo").value.trim();
        state.Q2_outro = screen.querySelector("#q2outro").value.trim();
        award({ coins: 10, xp: 5 });
        next();
      };
      return;
    }

    if (state.step === 3) {
      const options = ["Sim","Não"];

      renderChoices({
        title: "Missão 3/11 — Você utiliza tecnologia (celular/computador) para estudar?",
        subtitle: "Escolha uma opção.",
        options,
        selected: state.Q3_usa_estudar,
        onSelect: (opt) => { state.Q3_usa_estudar = opt; render(); }
      });

      screen.querySelector("#next").onclick = () => {
        unlockAudio();
        if (!state.Q3_usa_estudar) return alert("Escolha Sim ou Não.");
        award({ coins: 10, xp: 5 });

        if (state.Q3_usa_estudar === "Sim") {
          renderText({
            title: "Missão 3.1 — Dê um exemplo",
            subtitle: "Uma frase curta.",
            value: state.Q3_1_exemplo,
            placeholder: "Ex.: Assisto videoaulas e faço resumo…",
            onSave: (txt) => {
              state.Q3_1_exemplo = txt;
              award({ coins: 5, xp: 10 });
            }
          });
          screen.querySelector("#back").onclick = () => { state.step = 3; render(); };
          return;
        }

        next();
      };
      return;
    }

    if (state.step === 4) {
      const options = ["Sozinho(a) explorando","Com amigos/colegas","Com professores","Com familiares","Cursos/Oficinas","Outra"];

      renderChoices({
        title: "Missão 4/11 — Como você aprendeu a usar tecnologias digitais?",
        subtitle: "Escolha uma opção.",
        options,
        selected: state.Q4_como_aprendeu,
        onSelect: (opt) => { state.Q4_como_aprendeu = opt; render(); }
      });

      screen.querySelector("#next").onclick = () => {
        unlockAudio();
        if (!state.Q4_como_aprendeu) return alert("Escolha uma opção.");
        award({ coins: 10, xp: 5 });
        next();
      };
      return;
    }

    if (state.step === 5) {
      const options = ["Google/Buscadores","YouTube","Redes sociais","Sites confiáveis (instituições)","Professores","Amigos/colegas","Outra"];

      renderChoices({
        title: "Missão 5/11 — Quando precisa de informação, onde você busca primeiro?",
        subtitle: "Escolha uma opção.",
        options,
        selected: state.Q5_onde_busca,
        onSelect: (opt) => { state.Q5_onde_busca = opt; render(); }
      });

      screen.querySelector("#next").onclick = () => {
        unlockAudio();
        if (!state.Q5_onde_busca) return alert("Escolha uma opção.");
        award({ coins: 10, xp: 5 });
        next();
      };
      return;
    }

    if (state.step === 6) {
      const options = [
        "1 — Quase nunca verifico",
        "2 — Verifico às vezes",
        "3 — Verifico com frequência",
        "4 — Verifico e comparo fontes",
        "5 — Sou bem criterioso(a) (comparação + checagem)"
      ];

      renderChoices({
        title: "Missão 6/11 — Como você verifica se uma informação é confiável?",
        subtitle: "Escolha o nível.",
        options,
        selected: state.Q6_verifica_info,
        onSelect: (opt) => { state.Q6_verifica_info = opt; render(); }
      });

      screen.querySelector("#next").onclick = () => {
        unlockAudio();
        if (!state.Q6_verifica_info) return alert("Escolha um nível.");
        award({ coins: 10, xp: 10, badge: "Detetive da Internet" });
        next();
      };
      return;
    }

    if (state.step === 7) {
      const options = ["Sim","Não"];

      renderChoices({
        title: "Missão 7/11 — Você já usou IA (ex.: ChatGPT) para atividade escolar?",
        subtitle: "Escolha uma opção.",
        options,
        selected: state.Q7_usou_IA,
        onSelect: (opt) => { state.Q7_usou_IA = opt; render(); }
      });

      screen.querySelector("#next").onclick = () => {
        unlockAudio();
        if (!state.Q7_usou_IA) return alert("Escolha Sim ou Não.");
        award({ coins: 10, xp: 5 });

        if (state.Q7_usou_IA === "Sim") {
          renderText({
            title: "Missão 7.1 — Conte como foi",
            subtitle: "O que você fez? Ajudou?",
            value: state.Q7_1_experiencia,
            placeholder: "Ex.: Usei para entender um tema…",
            onSave: (txt) => {
              state.Q7_1_experiencia = txt;
              award({ coins: 5, xp: 15, badge: "Explorador de IA" });
            }
          });
          screen.querySelector("#back").onclick = () => { state.step = 7; render(); };
          return;
        }

        next();
      };
      return;
    }

    if (state.step === 8) {
      const options = ["Sim, atende bem","Atende parcialmente","Não atende","Não sei avaliar"];

      renderChoices({
        title: "Missão 8/11 — A estrutura tecnológica do IFAC ajuda você a aprender?",
        subtitle: "Escolha uma opção.",
        options,
        selected: state.Q8_estrutura_IFAC,
        onSelect: (opt) => { state.Q8_estrutura_IFAC = opt; render(); }
      });

      screen.querySelector("#next").onclick = () => {
        unlockAudio();
        if (!state.Q8_estrutura_IFAC) return alert("Escolha uma opção.");
        award({ coins: 10, xp: 5 });
        next();
      };
      return;
    }

    if (state.step === 9) {
      const options = ["Sim","Não","Às vezes"];

      renderChoices({
        title: "Missão 9/11 — Professores incentivam tecnologias digitais nas aulas?",
        subtitle: "Escolha uma opção.",
        options,
        selected: state.Q9_prof_incentiva,
        onSelect: (opt) => { state.Q9_prof_incentiva = opt; render(); }
      });

      screen.querySelector("#next").onclick = () => {
        unlockAudio();
        if (!state.Q9_prof_incentiva) return alert("Escolha uma opção.");
        award({ coins: 10, xp: 5 });

        if (state.Q9_prof_incentiva !== "Não") {
          renderText({
            title: "Missão 9.1 — Dê um exemplo",
            subtitle: "Pode ser ferramenta, plataforma, atividade…",
            value: state.Q9_1_exemplo,
            placeholder: "Ex.: Usamos vídeos, formulários…",
            onSave: (txt) => {
              state.Q9_1_exemplo = txt;
              award({ coins: 5, xp: 10 });
            }
          });
          screen.querySelector("#back").onclick = () => { state.step = 9; render(); };
          return;
        }

        next();
      };
      return;
    }

    if (state.step === 10) {
      const options = [
        "Falta de internet/dados",
        "Falta de computador/celular adequado",
        "Dificuldade em encontrar informação confiável",
        "Dificuldade em usar ferramentas/plataformas",
        "Falta de tempo/organização",
        "Outra"
      ];

      renderChoices({
        title: "Missão 10/11 — Maior dificuldade ao usar tecnologia para aprender?",
        subtitle: "Escolha uma opção.",
        options,
        selected: state.Q10_dificuldade,
        onSelect: (opt) => { state.Q10_dificuldade = opt; render(); },
        extraHtml: state.Q10_dificuldade === "Outra"
          ? `<div style="margin-top:10px"><div class="small">Qual?</div><input id="q10outra" value="${escapeHtml(state.Q10_outra)}"/></div>`
          : ``
      });

      screen.querySelector("#next").onclick = () => {
        unlockAudio();
        if (!state.Q10_dificuldade) return alert("Escolha uma opção.");
        state.Q10_outra = state.Q10_dificuldade === "Outra"
          ? (screen.querySelector("#q10outra")?.value.trim() || "")
          : "";
        award({ coins: 10, xp: 10 });
        next();
      };
      return;
    }

    if (state.step === 11) {
      const options = [
        "Pesquisar melhor na internet",
        "Verificar se a informação é confiável",
        "Produzir conteúdos (texto, vídeo, apresentação)",
        "Organizar estudos com apps",
        "Usar IA de forma ética para aprender",
        "Outra"
      ];

      renderChoices({
        title: "Missão 11/11 — Que habilidade digital você gostaria de desenvolver?",
        subtitle: "Escolha uma opção.",
        options,
        selected: state.Q11_habilidade,
        onSelect: (opt) => { state.Q11_habilidade = opt; render(); },
        extraHtml: state.Q11_habilidade === "Outra"
          ? `<div style="margin-top:10px"><div class="small">Qual?</div><input id="q11outra" value="${escapeHtml(state.Q11_outra)}"/></div>`
          : ``
      });

      screen.querySelector("#next").onclick = async () => {
        unlockAudio();

        if (!state.Q11_habilidade) return alert("Escolha uma opção.");

        state.Q11_outra = state.Q11_habilidade === "Outra"
          ? (screen.querySelector("#q11outra")?.value.trim() || "")
          : "";

        award({ coins: 15, xp: 20, badge: "Explorador Digital" });

        const payload = {
          timestamp_inicio: state.startedAt,
          timestamp_fim: new Date().toISOString(),
          device: state.device,
          nome: state.nome,
          matricula: state.matricula,
          curso: state.curso,
          Q1_atividade: state.Q1_atividade,
          Q1_outro: state.Q1_outro,
          Q2_escolhas: state.Q2_escolhas,
          Q2_outro: state.Q2_outro,
          Q2_jogo_qual: state.Q2_jogo_qual,
          Q3_usa_estudar: state.Q3_usa_estudar,
          Q3_1_exemplo: state.Q3_1_exemplo,
          Q4_como_aprendeu: state.Q4_como_aprendeu,
          Q5_onde_busca: state.Q5_onde_busca,
          Q6_verifica_info: state.Q6_verifica_info,
          Q7_usou_IA: state.Q7_usou_IA,
          Q7_1_experiencia: state.Q7_1_experiencia,
          Q8_estrutura_IFAC: state.Q8_estrutura_IFAC,
          Q9_prof_incentiva: state.Q9_prof_incentiva,
          Q9_1_exemplo: state.Q9_1_exemplo,
          Q10_dificuldade: state.Q10_dificuldade,
          Q10_outra: state.Q10_outra,
          Q11_habilidade: state.Q11_habilidade,
          Q11_outra: state.Q11_outra,
          moedas_total: state.coins,
          xp_total: state.xp,
          badges: state.badges
        };

        screen.innerHTML = `
          <h2>Enviando suas respostas…</h2>
          <p class="small">Aguarde só um instante.</p>
        `;

        try {
          const resp = await fetch(WEB_APP_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
          });

          const json = await resp.json();
          if (!json.ok) throw new Error(json.error || "Falha ao salvar.");

          screen.innerHTML = `
            <div class="orb o1"></div>
            <div class="orb o2"></div>

            <h1>Missão concluída! ✅</h1>
            <p>
              Obrigado por participar.<br>
              Suas respostas vão contribuir para melhorar o uso de tecnologias digitais nas aulas do IFAC.
            </p>

            <div class="result-grid">
              <div class="result-card">
                <div class="result-title">Moedas</div>
                <div class="result-value">🪙 ${state.coins}</div>
              </div>
              <div class="result-card">
                <div class="result-title">XP</div>
                <div class="result-value">⚡ ${state.xp}</div>
              </div>
              <div class="result-card">
                <div class="result-title">Perfil</div>
                <div class="result-value">🚀 Explorador</div>
              </div>
            </div>

            <div class="divider"></div>
            <h2>Badges conquistados</h2>
            ${
              state.badges.length
                ? `
                  <div class="badge-grid">
                    ${state.badges.map(b => `
                      <div class="badge-card">🏅 ${escapeHtml(b)}</div>
                    `).join("")}
                  </div>
                `
                : `<p class="small">Nenhum badge conquistado.</p>`
            }

            <div class="btns">
              <button onclick="location.reload()">Jogar novamente</button>
            </div>
          `;

          showConfetti();
          playVictorySound();

        } catch (e) {
          screen.innerHTML = `
            <h2>Não consegui salvar 😕</h2>
            <p class="small">Erro: ${escapeHtml(String(e))}</p>
            <div class="btns"><button onclick="location.reload()">Recomeçar</button></div>
          `;
        }
      };
      return;
    }
  }

  setProgress();
  render();
</script>
</body>
</html>
